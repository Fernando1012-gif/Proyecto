      <!-- Calendario -->
        

      <script>
        document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es', 
        height: 450,
        headerToolbar: {
            left: 'prev,next',
            center: 'title',
            right: '' 
        },
        // Carga los días rojos directamente de tu servidor
        events: async function(info, successCallback, failureCallback) {
            try {
                const res = await fetch('/api/permisos/Aceptado');
                const datos = await res.json();
                
                // Mapeamos los datos de tu tabla permisos_goce
                const eventos = datos.map(p => ({
                    title: 'OCUPADO',
                    start: p.fecha_inicio || p.fecha_salida, // Ajusta al nombre de tu columna
                    backgroundColor: '#ff0000',
                    borderColor: '#ff0000',
                    allDay: true
                }));
                successCallback(eventos);
            } catch (error) {
                console.error("Error cargando eventos:", error);
                failureCallback(error);
            }
        }
    });
    
    calendar.render();

    // También cargamos la lista de texto de la izquierda
    cargarResumenGeneral();
});

async function cargarResumenGeneral() {
    try {
        const res = await fetch('/api/permisos/Aprobado');
        const datos = await res.json();
        const lista = document.getElementById('lista-general');
        
        lista.innerHTML = datos.slice(0, 5).map(p => `
            <li class="item-aprobado">${p.tipo_permiso} - ${p.fecha_inicio || p.fecha_salida} (Aprobado)</li>
        `).join('');
    } catch (e) {
        console.error("Error en resumen:", e);
    }
}
      </script>
