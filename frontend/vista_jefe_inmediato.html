<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Control - Subdirección</title>
    <link rel="stylesheet" href="recursos/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
</head>
<body>
    <div class="canvas-principal">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Control de Salidas (Jefe Inmediato)</h1>
            <button onclick="localStorage.clear(); location.href='login.html'" class="status-card rojo" style="padding: 5px 15px; cursor: pointer;">Cerrar Sesión</button>
        </header>

        <div class="grid-cuerpo">
            <div class="panel-bordeado">
                <h3>Solicitudes Pendientes</h3>
                <ul class="lista-permisos" id="contenedorSolicitudes">
                    <p>Cargando solicitudes...</p>
                </ul>
            </div>

            <div class="columna-derecha">
                <div class="panel-bordeado">
                    <h3>Calendario Global de Personal</h3>
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div> 
    <script src="js/jefe.js"></script>
</body>
</html>
