<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Permisos</title>
    <link rel="icon" type="image/png" href="recursos/imagenes/logoUTM.png">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link rel="stylesheet" href="recursos/css/style.css">
</head>
<body>

<!--FONDO DINAMICO-->

 <svg version="1.1" xmlns="http://www.w3.org/2000/svg"
		xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" width="100%" height="100%" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice">
		<defs>
			<linearGradient id="bg">
				<stop offset="0%" style="stop-color:rgba(255, 255, 255, 0.06)"></stop>
				<stop offset="50%" style="stop-color:rgba(216, 236, 248, 0.6)"></stop>
				<stop offset="100%" style="stop-color:rgba(115, 209, 72, 0.2)"></stop>
			</linearGradient>
			<path id="wave" fill="url(#bg)" d="M-363.852,502.589c0,0,236.988-41.997,505.475,0
	s371.981,38.998,575.971,0s293.985-39.278,505.474,5.859s493.475,48.368,716.963-4.995v560.106H-363.852V502.589z" />
		</defs>
		<g>
			<use xlink:href='#wave' opacity=".3">
				<animateTransform
          attributeName="transform"
          attributeType="XML"
          type="translate"
          dur="10s"
          calcMode="spline"
          values="270 230; -334 180; 270 230"
          keyTimes="0; .5; 1"
          keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
          repeatCount="indefinite" />
			</use>
			<use xlink:href='#wave' opacity=".6">
				<animateTransform
          attributeName="transform"
          attributeType="XML"
          type="translate"
          dur="8s"
          calcMode="spline"
          values="-270 230;243 220;-270 230"
          keyTimes="0; .6; 1"
          keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
          repeatCount="indefinite" />
			</use>
			<use xlink:href='#wave' opacty=".9">
				<animateTransform
          attributeName="transform"
          attributeType="XML"
          type="translate"
          dur="6s"
          calcMode="spline"
          values="0 230;-140 200;0 230"
          keyTimes="0; .4; 1"
          keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
          repeatCount="indefinite" />
			</use>
		</g>
	</svg>





    <!-- APARTADO Vista para el Jefe Inmediato -->
    

    <div class="canvas-principal">
        <h1>Vista para el Jefe Inmediato</h1><br>

        <div class="contenedor-estados">
            <a href="aprobados.html" class="status-card verde">Aprobados</a>
            <a href="pendientes.html" class="status-card amarillo">Pendientes</a>
            <a href="rechazados.html" id="btn-rechazar" class="status-card rojo">Rechazados</a>
            <audio id="sonido-rechazo" src="error.mp3" preload="auto"></audio>

        </div>

        <div class="grid-cuerpo">
            <!--Aqui va la lista de salidas-->
            <div class="panel-bordeado">
                <h3>Lista de salidas (General)</h3>
                <ul class="lista-permisos">
                    <li class="item-aprobado">Salida Museos - 12 Feb (Aprobado)</li>
                    <li class="item-pendiente">Salida Deportiva - 15 Feb (Pendiente)</li>
                    <li class="item-rechazado">Excursión Río - 10 Feb (Rechazado)</li>
                    </ul>
            </div>
<!--Aqui va el contenedor del calendario-->
            <div class="columna-derecha">
                <div class="panel-bordeado">
                    <h3>Calendario de Solicitudes</h3>
                    
                    <div id="calendar"></div>
                    
                    <p class="nota-calendario">
                        Los días en <strong style="color: red;">ROJO</strong> indican una solicitud aprobada.
                    </p>
                </div>
            </div>

        </div> </div> 
        

      <!-- Calendario -->
        <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        
        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          locale: 'es', 
          height: 450,
          headerToolbar: {
            left: 'prev,next',
            center: 'title',
            right: '' 
          },


          // Aquí van los días rojos
          events: [
            {
              title: 'OCUPADO',
              start: '2026-02-10', 
              backgroundColor: '#ff0000', 
              borderColor: '#ff0000',
              allDay: true
            },
            {
              title: 'OCUPADO',
              start: '2026-02-18',
              backgroundColor: '#ff0000',
              borderColor: '#ff0000',
              allDay: true
            }
          ]
        });
        
        calendar.render();
      });


    </script>
   

</body>
</html>
