<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directivos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/35660cdf83.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link rel="icon" type="image/png" sizes="32x32" href="/imagenes/red/favicon-32x32.png">
    <link rel="stylesheet" href="recursos/css/estilos.css">
    <link rel="stylesheet" href="recursos/css/jefes.css">
</head>
<body>

    <div class="top-navbar d-flex justify-content-between align-items-center px-3">
        <div>
            <img src="recursos/imagenes/isologo_UTM_white.svg" height="29" alt="logo">
        </div>

        <div class="d-flex align-items-center gap-3">
            <div class="dropdown">
                <button class="btn dropdown-toggle text-white fw-bold border-0 d-flex align-items-center p-0" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fa-solid fa-circle-user fa-xl me-2"></i>
                    <span id="saludo-jefe" style="font-size: 0.9rem;" class="d-none d-sm-inline">Cargando...</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userMenu">
                    <li class="px-3 py-2 small text-muted border-bottom">Opciones de cuenta</li>
                    <li>
                        <a class="dropdown-item py-2" href="#" data-bs-toggle="modal" data-bs-target="#modalCambiarPass">
                            <i class="fa-solid fa-key me-2 text-warning"></i> Cambiar Contraseña
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item py-2 text-danger fw-bold" href="#" id="btn-logout">
                            <i class="fa-solid fa-power-off me-2"></i> Cerrar Sesión
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div class="main-workspace">
        <div class="sidebar">
            <h5 class="fw-bold" style="color: var(--utm-teal); border-bottom: 2px solid #eee; padding-bottom: 10px;">
                <i class="fa-solid fa-list-check me-2"></i>Pendientes
            </h5>
            <div class="scroll-interno" id="lista-pendientes">
                <div class="card mb-2 border-0"><div class="card-body p-3"><div class="skeleton-box" style="width: 70%; height: 1.2rem; margin-bottom: 8px;"></div><div class="skeleton-box" style="width: 40%; height: 0.8rem;"></div><div class="mt-2 text-end"><div class="skeleton-box" style="width: 30%; height: 1.2rem; border-radius: 5px;"></div></div></div></div>
                <div class="card mb-2 border-0"><div class="card-body p-3"><div class="skeleton-box" style="width: 80%; height: 1.2rem; margin-bottom: 8px;"></div><div class="skeleton-box" style="width: 50%; height: 0.8rem;"></div><div class="mt-2 text-end"><div class="skeleton-box" style="width: 30%; height: 1.2rem; border-radius: 5px;"></div></div></div></div>
            </div>
        </div>

        <div class="content-area">


            <div class="mini-filter-bar shadow-sm">
                <input type="text" id="mini-docente" class="form-control form-control-sm w-25" placeholder="Buscar docente..." onkeyup="ejecutarMiniFiltro()">

                <div class="btn-group btn-group-sm">
                    <input type="radio" class="btn-check" name="btn-tipo" id="t-todos" value="Ambos" checked onchange="ejecutarMiniFiltro()">
                    <label class="btn btn-outline-secondary" for="t-todos">Todos</label>
                    
                    <input type="radio" class="btn-check" name="btn-tipo" id="t-pases" value="Pase" onchange="ejecutarMiniFiltro()">
                    <label class="btn btn-outline-secondary" for="t-pases">Pases</label>
                    
                    <input type="radio" class="btn-check" name="btn-tipo" id="t-permisos" value="Permiso" onchange="ejecutarMiniFiltro()">
                    <label class="btn btn-outline-secondary" for="t-permisos">Permisos</label>
                </div>

                <div class="form-check form-switch small ms-auto">
                    <input class="form-check-input" type="checkbox" id="check-solo-pendientes" onchange="ejecutarMiniFiltro()">
                    <label class="form-check-label fw-bold text-muted" for="check-solo-pendientes">Solo Pendientes</label>
                </div>
            </div>

            <div class="panel-estadisticas">
                <h6 class="fw-bold" style="color: var(--utm-teal);"><i class="fa-solid fa-chart-bar me-2"></i>Historial de Aprobaciones</h6>
                <div class="scroll-interno">
                    <table class="table table-sm table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Docente</th>
                                <th>Tipo</th>
                                <th>Fecha</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-estadisticas"></tbody>
                    </table>
                </div>
            </div>

            <div class="panel-calendario">
                <div id="calendario-jefe"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalDetalleSolicitud" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold" style="color: var(--utm-teal);"><i class="fa-solid fa-circle-info me-2"></i>Detalles</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <label class="text-muted small fw-bold text-uppercase">Docente</label>
                            <p id="det-nombre" class="fs-5 fw-bold text-dark mb-0"></p>
                        </div>
                        <span id="det-tipo-badge" class="badge rounded-pill px-3 py-2"></span>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small fw-bold text-uppercase">Solicitado el día:</label>
                        <p id="det-fecha-creacion" class="fw-bold text-dark mb-0"></p>
                    </div>
                    <hr class="my-2 opacity-25">
                    <hr class="my-3 text-muted opacity-25">
                    <div class="row mb-3">
                        <div class="col-6">
                            <label id="label-fecha-principal" class="text-muted small fw-bold text-uppercase">Fecha Inicio</label>
                            <p id="det-fecha" class="fw-semibold fs-6 mb-0"></p>
                        </div>
                        <div class="col-6" id="det-contenedor-fin" style="display: none;">
                            <label class="text-muted small fw-bold text-uppercase">Fecha Fin</label>
                            <p id="det-fecha-fin" class="fw-semibold fs-6 mb-0"></p>
                        </div>
                        <div class="col-6" id="det-contenedor-horas" style="display: none;">
                            <label class="text-muted small fw-bold text-uppercase">Horario (Salida - Regreso)</label>
                            <p id="det-horas" class="fw-semibold fs-6 mb-0 text-primary"></p>
                        </div>
                    </div>
                    <div class="mb-3" id="det-contenedor-dias" style="display: none;">
                        <label class="text-muted small fw-bold text-uppercase">Días de Inasistencia</label>
                        <p id="det-dias" class="fw-bold fs-5 text-teal" style="color: var(--utm-teal);"></p>
                    </div>
                    <div id="det-contenedor-revision" style="display: none;" class="p-3 mb-3 bg-success bg-opacity-10 border border-success rounded">
                        <div class="row">
                            <div class="col-6">
                                <label class="text-muted small fw-bold text-uppercase">Revisado por:</label>
                                <p id="det-revisado-por" class="fw-bold mb-0 text-success"></p>
                            </div>
                            <div class="col-6">
                                <label class="text-muted small fw-bold text-uppercase">Fecha de respuesta:</label>
                                <p id="det-fecha-revision" class="small fw-semibold mb-0"></p>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small fw-bold text-uppercase">Motivo / Justificación</label>
                        <div class="p-3 bg-light rounded border">
                            <p id="det-motivo" class="mb-0 text-secondary" style="font-style: italic;"></p>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <span id="det-estado-badge" class="badge fs-6"></span>
                        <button id="btn-descargar-pdf" class="btn btn-danger fw-bold shadow-sm" style="display: none;">
                            <i class="fa-solid fa-file-pdf me-1"></i> Descargar PDF
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCambiarPass" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light">
                    <h6 class="modal-title fw-bold"><i class="fa-solid fa-lock me-2"></i>Seguridad</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-cambiar-pass">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Contraseña Actual</label>
                            <input type="password" class="form-control form-control-sm" id="pass-actual" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nueva Contraseña</label>
                            <input type="password" class="form-control form-control-sm" id="pass-nueva" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm w-100 fw-bold">Actualizar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 10000;">
        <div id="toastNotificacion" class="toast" role="alert">
            <div class="toast-header text-white" id="toast-header-bg">
                <strong class="me-auto">Aviso</strong>
            </div>
            <div class="toast-body fw-bold" id="toast-mensaje"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/vista_jefe.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="js/admins.js"></script>
    <script src="js/pdfsito.js"></script>

    <!-- Bottom Tab Nav (Solo Móvil) -->
    <nav class="bottom-tab-nav d-md-none">
        <button class="tab-item active" id="tab-home" onclick="cambiarTabApp(0)">
            <i class="fa-solid fa-list-check"></i>
            <span>Revisión</span>
        </button>
        <button class="tab-item" id="tab-hist" onclick="cambiarTabApp(1)">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Métricas</span>
        </button>
        <button class="tab-item" id="tab-cal" onclick="cambiarTabApp(2)">
            <i class="fa-regular fa-calendar"></i>
            <span>Calendario</span>
        </button>
        <button class="tab-item" onclick="document.getElementById('btn-logout').click()">
            <i class="fa-solid fa-power-off" style="color: var(--utm-red);"></i>
            <span style="color: var(--utm-red);">Salir</span>
        </button>
    </nav>
</body>
</html>
