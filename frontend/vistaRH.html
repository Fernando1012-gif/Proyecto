<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/35660cdf83.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link rel="icon" type="image/png" sizes="32x32" href="/imagenes/blue/favicon-32x32.png">
    <link rel="stylesheet" href="recursos/css/estilos.css">
    <link rel="stylesheet" href="recursos/css/rh.css">
</head>
<body>

    <div class="top-navbar d-flex justify-content-between align-items-center px-3">
        <div>
            <img src="recursos/imagenes/isologo_UTM_white.svg" height="25" alt="logo">
        </div>

        <div class="d-flex align-items-center gap-2">
            
            <div class="d-md-none d-flex gap-2 align-items-center">
                <button class="btn text-white p-2" onclick="toggleFiltrosMovil(true)" title="Filtros">
                    <i class="fa-solid fa-filter fa-lg"></i>
                </button>
                <button class="btn text-white p-2" data-bs-toggle="offcanvas" data-bs-target="#offcanvasCalendario" title="Calendario">
                    <i class="fa-solid fa-calendar-days fa-lg"></i>
                </button>
                <a href="informeRH.html" class="btn text-white p-2" title="Estadísticas">
                    <i class="fa-solid fa-chart-pie fa-lg"></i>
                </a>
                <a href="vistaRHS.html" class="btn text-white p-2 position-relative" title="Por Autorizar">
                    <i class="fa-solid fa-bell fa-lg"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="badge-nav-solicitudes-movil" style="font-size: 0.6rem;">0</span>
                </a>
            </div>

            <div class="d-none d-md-flex align-items-center me-3">
                <a href="informeRH.html" class="btn btn-outline-light border-0 fw-bold" style="background-color: rgba(255,255,255,0.1);">
                    <i class="fa-solid fa-chart-pie me-2"></i>Estadísticas
                </a>
            </div>

            <div class="dropdown ms-2">
                <button class="btn dropdown-toggle text-white fw-bold border-0 d-flex align-items-center p-0" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fa-solid fa-circle-user fa-xl me-2"></i>
                    <span id="saludo-rh" class="d-none d-sm-inline" style="font-size: 0.9rem;">Cargando...</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userMenu">
                    <li class="px-3 py-2 small text-muted border-bottom">Opciones de cuenta</li>
                    <li>
                        <a class="dropdown-item py-2" href="#" data-bs-toggle="modal" data-bs-target="#modalCambiarPass">
                            <i class="fa-solid fa-key me-2 text-warning"></i> Cambiar Contraseña
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item py-2 text-danger fw-bold" href="#" id="btn-logout">
                            <i class="fa-solid fa-power-off me-2"></i> Cerrar Sesión
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div class="main-workspace">
        <div class="sidebar">
            <button id="btn-cerrar-filtros" class="btn-cerrar-overlay" onclick="toggleFiltrosMovil(false)">
                <i class="fa-solid fa-check"></i>
            </button>
            <h5 class="fw-bold text-primary mb-3"><i class="fa-solid fa-filter me-2"></i>Filtros Avanzados</h5>
            <form id="form-filtros">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Docente</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-docente" placeholder="Buscar por nombre...">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Área / Departamento</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-area" placeholder="Ej. Enfermería, Sistemas...">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Tipo de Trámite</label>
                    <select class="form-select form-select-sm" id="filtro-tipo">
                        <option value="Todos">Todos</option>
                        <option value="Pase">Pases de Salida</option>
                        <option value="Permiso">Permisos</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Estado</label>
                    <select class="form-select form-select-sm" id="filtro-estado">
                        <option value="Todos">Todos</option>
                        <option value="Aprobado">Aprobados</option>
                        <option value="Vo.Bo.">Con Vo.Bo.</option>
                        <option value="Pendiente">Pendientes</option>
                        <option value="Rechazado">Rechazados</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Rango de Fechas</label>
                    <div class="d-flex gap-2">
                        <input type="date" class="form-control form-control-sm" id="filtro-fecha-inicio" title="Desde">
                        <input type="date" class="form-control form-control-sm" id="filtro-fecha-fin" title="Hasta">
                    </div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small fw-bold">Mes Histórico</label>
                        <select class="form-select form-select-sm" id="filtro-mes">
                            <option value>Todos</option>
                            <option value="01">Enero</option><option value="02">Febrero</option>
                            <option value="03">Marzo</option><option value="04">Abril</option>
                            <option value="05">Mayo</option><option value="06">Junio</option>
                            <option value="07">Julio</option><option value="08">Agosto</option>
                            <option value="09">Septiembre</option><option value="10">Octubre</option>
                            <option value="11">Noviembre</option><option value="12">Diciembre</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold">Año</label>
                        <input type="number" class="form-control form-control-sm" id="filtro-año" placeholder="Ej. 2026">
                    </div>
                </div>
                <button type="button" class="btn btn-aero w-100 mb-2 py-2 shadow-sm" id="btn-aplicar-filtros" onclick="toggleFiltrosMovil(false)">
                    <i class="fa-solid fa-magnifying-glass me-2"></i>Buscar
                </button>
                <button type="reset" class="btn btn-light w-100 border py-2" onclick="setTimeout(aplicarFiltros, 100)">Limpiar Filtros</button>
            </form>
        </div>

        <div class="content-area">
            <div class="historial-panel">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                    <div>
                        <h5 class="fw-bold m-0 text-dark"><i class="fa-solid fa-table-list me-2 text-primary"></i>Historial</h5>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-success fw-bold shadow-sm px-3" onclick="exportarExcel()"><i class="fa-solid fa-file-excel me-2 d-none d-md-inline"></i>CSV</button>
                        <div class="btn-group border rounded shadow-sm bg-white">
                            <button class="btn btn-light px-3" onclick="ordenarRapido('reciente')" title="Más recientes"><i class="fa-solid fa-clock-rotate-left text-primary"></i></button>
                            <button class="btn btn-light px-3" onclick="ordenarRapido('nombre')" title="Orden Alfabético"><i class="fa-solid fa-font text-primary"></i></button>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle m-0" style="font-size: 0.9rem;">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-3">ID</th>
                                <th>Tipo</th>
                                <th>Docente</th>
                                <th>Fecha Evento</th>
                                <th>Estado Actual</th>
                                <th>Motivo</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-general"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="contenedor-flotante" class="position-fixed m-4 d-flex gap-3 btn-grupo-flotante" style="z-index: 1050; bottom: 20px; right: 20px;">
            <a href="vistaRHS.html" class="btn shadow-lg rounded-pill px-4 py-3 fw-bold d-flex align-items-center" style="background-color: var(--utm-red); color: white; border: none;">
                <i class="fa-solid fa-bell fa-shake me-2"></i> Por Autorizar
                <span class="badge bg-white text-danger rounded-pill ms-2 shadow-sm" id="badge-nav-solicitudes">0</span>
            </a>
            <button class="btn btn-aero shadow-lg rounded-pill px-4 py-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasCalendario">
                <i class="fa-solid fa-calendar-days me-2"></i>Ver Calendario Global
            </button>
        </div>

        <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasCalendario" style="width: 600px;">
            <div class="offcanvas-header border-bottom bg-light">
                <h5 class="offcanvas-title fw-bold text-primary">Calendario Global</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <div id="calendario-rh" style="height: 100%;"></div>
            </div>
        </div>

        <div class="modal fade" id="modalDetalleRH" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header bg-light">
                        <h5 class="modal-title fw-bold" style="color: var(--utm-teal);">Detalle del Trámite</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <label class="text-muted small fw-bold">Docente</label>
                        <p id="det-rh-nombre" class="fs-5 fw-bold text-dark"></p>
                        <div class="row mb-3">
                            <div class="mb-3">
                                <label class="text-muted small fw-bold text-uppercase">Solicitado el día:</label>
                                <p id="det-fecha-creacion" class="fw-bold text-dark mb-0"></p>
                            </div>
                            <hr class="my-2 opacity-25">
                            <div class="col-6">
                                <label id="det-rh-label-fecha" class="text-muted small fw-bold">Fecha</label>
                                <p id="det-rh-fecha" class="fw-semibold mb-0"></p>
                            </div>
                            <div class="col-6" id="det-rh-cont-fin" style="display:none;">
                                <label class="text-muted small fw-bold">Fecha Fin</label>
                                <p id="det-rh-fecha-fin" class="fw-semibold mb-0"></p>
                            </div>
                            <div class="col-6" id="det-rh-cont-horas" style="display:none;">
                                <label class="text-muted small fw-bold">Horario</label>
                                <p id="det-rh-horas" class="fw-semibold mb-0 text-primary"></p>
                            </div>
                        </div>
                        <div class="mb-3" id="det-rh-cont-dias" style="display:none;">
                            <label class="text-muted small fw-bold">Días Solicitados</label>
                            <p id="det-rh-dias" class="fw-bold fs-4" style="color: var(--utm-teal);"></p>
                        </div>
                        <div id="det-rh-cont-revision" style="display: none;" class="p-3 mb-3 bg-success bg-opacity-10 border border-success rounded">
                            <div class="row">
                                <div class="col-6">
                                    <label class="text-muted small fw-bold text-uppercase">Revisado por:</label>
                                    <p id="det-rh-revisado-por" class="fw-bold mb-0 text-success"></p>
                                </div>
                                <div class="col-6">
                                    <label class="text-muted small fw-bold text-uppercase">Fecha de respuesta:</label>
                                    <p id="det-rh-fecha-revision" class="small fw-semibold mb-0"></p>
                                </div>
                            </div>
                        </div>
                        <label class="text-muted small fw-bold">Motivo</label>
                        <div class="p-3 bg-light rounded border"><p id="det-rh-motivo" class="mb-0 small italic text-secondary"></p></div>
                        <div class="d-flex justify-content-between align-items-center mt-4 border-top pt-3">
                            <div class="d-flex gap-2 align-items-center">
                                <span id="det-rh-tipo-badge" class="badge rounded-pill px-3 py-2"></span>
                                <span id="det-rh-estado-badge" class="badge fs-6"></span>
                            </div>
                            <button id="btn-descargar-pdf" class="btn btn-danger fw-bold shadow-sm" style="display: none;">
                                <i class="fa-solid fa-file-pdf me-1"></i> Descargar PDF
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalCambiarPass" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-sm">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header bg-light">
                        <h6 class="modal-title fw-bold"><i class="fa-solid fa-lock me-2"></i>Seguridad</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="form-cambiar-pass">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Contraseña Actual</label>
                                <input type="password" class="form-control form-control-sm" id="pass-actual" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Nueva Contraseña</label>
                                <input type="password" class="form-control form-control-sm" id="pass-nueva" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm w-100 fw-bold">Actualizar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
        <script src="js/vista_rh.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script src="js/admins.js"></script>
        <script src="js/pdfsito.js"></script>
    </div>
</body>
</html>
