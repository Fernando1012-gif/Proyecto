<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Autorizaciones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/35660cdf83.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" sizes="32x32" href="/imagenes/blue/favicon-32x32.png">
    <link rel="stylesheet" href="recursos/css/estilos.css">
    <link rel="stylesheet" href="recursos/css/rh.css">
</head>
<body>

    <div class="top-navbar d-flex justify-content-between align-items-center px-3">
        <div class="d-flex align-items-center">
            <img src="recursos/imagenes/isologo_UTM_white.svg" height="25" class="me-3" alt="logo">
            <a href="vistaRH.html" class="btn btn-outline-light d-none d-md-inline border-0 fw-bold" style="background-color: rgba(255,255,255,0.1);">
                <i class="fa-solid fa-arrow-left me-2"></i>Volver a Historial
            </a>
        </div>

        <div class="dropdown">
            <button class="btn dropdown-toggle text-white fw-bold border-0 d-flex align-items-center" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fa-solid fa-circle-user fa-2xl me-2"></i>
                <span id="saludo-rh">Cargando...</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userMenu">
                <li><a class="dropdown-item py-2 text-danger fw-bold" href="#" id="btn-logout"><i class="fa-solid fa-power-off me-2"></i> Cerrar Sesión</a></li>
            </ul>
        </div>
    </div>

    <div class="main-workspace">
        <div class="sidebar">
            <div class="alert alert-info border-0 shadow-sm mt-3">
                <h6 class="fw-bold"><i class="fa-solid fa-circle-info me-2"></i>Instrucciones</h6>
                <p class="small mb-0 text-dark">Revisa los tramites por aprobar. Estos obtendran la firma final y completa aprobacion. </p>
            </div>
        </div>

        <div class="content-area">
            <section class="mb-5">
                <div class="d-flex justify-content-between align-items-end mb-4 border-bottom pb-3">
                    <div class="d-flex align-items-center">
                        <div class="bg-primary bg-opacity-10 p-3 rounded-3 me-3">
                            <i class="fa-solid fa-inbox text-primary fs-3"></i>
                        </div>
                        <div>
                            <h4 class="fw-bold m-0 text-dark">Pendientes de Firmar</h4>
                            <p class="text-muted small m-0">Autorizacion RH</p>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary fw-bold shadow-sm" onclick="seleccionarTodoMasivo()">
                            <i class="fa-solid fa-check-double me-2"></i>Seleccionar Todos
                        </button>
                        <button class="btn btn-success fw-bold shadow-sm" onclick="aprobarSeleccionMasiva()">
                            <i class="fa-solid fa-signature me-2"></i>Aprobar Selección
                        </button>
                    </div>
                </div>
                
                <div id="pendientes-grid" class="row g-4">
                    </div>
            </section>
        </div>

        <div class="modal fade" id="modalDetalleRH" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header bg-light">
                        <h5 class="modal-title fw-bold" style="color: var(--utm-teal);">Detalle del Trámite</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <label class="text-muted small fw-bold">Docente</label>
                        <p id="det-rh-nombre" class="fs-5 fw-bold text-dark"></p>
                        <div class="row mb-3">
                            <div class="mb-3">
                                <label class="text-muted small fw-bold text-uppercase">Solicitado el día:</label>
                                <p id="det-fecha-creacion" class="fw-bold text-dark mb-0"></p>
                            </div>
                            <hr class="my-2 opacity-25">
                            <div class="col-6">
                                <label id="det-rh-label-fecha" class="text-muted small fw-bold">Fecha</label>
                                <p id="det-rh-fecha" class="fw-semibold mb-0"></p>
                            </div>
                            <div class="col-6" id="det-rh-cont-fin" style="display:none;">
                                <label class="text-muted small fw-bold">Fecha Fin</label>
                                <p id="det-rh-fecha-fin" class="fw-semibold mb-0"></p>
                            </div>
                            <div class="col-6" id="det-rh-cont-horas" style="display:none;">
                                <label class="text-muted small fw-bold">Horario</label>
                                <p id="det-rh-horas" class="fw-semibold mb-0 text-primary"></p>
                            </div>
                        </div>
                        <div class="mb-3" id="det-rh-cont-dias" style="display:none;">
                            <label class="text-muted small fw-bold">Días Solicitados</label>
                            <p id="det-rh-dias" class="fw-bold fs-4" style="color: var(--utm-teal);"></p>
                        </div>
                        <div id="det-rh-cont-revision" style="display: none;" class="p-3 mb-3 bg-success bg-opacity-10 border border-success rounded">
                            <div class="row">
                                <div class="col-6">
                                    <label class="text-muted small fw-bold text-uppercase">Revisado por:</label>
                                    <p id="det-rh-revisado-por" class="fw-bold mb-0 text-success"></p>
                                </div>
                                <div class="col-6">
                                    <label class="text-muted small fw-bold text-uppercase">Fecha de respuesta:</label>
                                    <p id="det-rh-fecha-revision" class="small fw-semibold mb-0"></p>
                                </div>
                            </div>
                        </div>
                        <label class="text-muted small fw-bold">Motivo</label>
                        <div class="p-3 bg-light rounded border"><p id="det-rh-motivo" class="mb-0 small italic text-secondary"></p></div>
                        <div class="d-flex justify-content-between align-items-center mt-4 border-top pt-3">
                            <div class="d-flex gap-2 align-items-center">
                                <span id="det-rh-tipo-badge" class="badge rounded-pill px-3 py-2"></span>
                                <span id="det-rh-estado-badge" class="badge fs-6"></span>
                            </div>
                            <button id="btn-descargar-pdf" class="btn btn-danger fw-bold shadow-sm" style="display: none;">
                                <i class="fa-solid fa-file-pdf me-1"></i> Descargar PDF
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
        <script src="js/vista_rh.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script src="js/admins.js"></script>
        <script src="js/pdfsito.js"></script>
        
        <!-- Bottom Tab Nav (Solo Móvil) -->
        <nav class="bottom-tab-nav d-md-none">
            <a href="vistaRH.html" class="tab-item">
                <i class="fa-solid fa-table-list"></i>
                <span>Historial</span>
            </a>
            <a href="vistaRHS.html" class="tab-item active position-relative">
                <i class="fa-solid fa-inbox"></i>
                <span>Autorizar</span>
                <span class="position-absolute top-0 start-50 translate-middle badge rounded-pill bg-danger" id="badge-nav-solicitudes-nav">0</span>
            </a>
            <a href="informeRH.html" class="tab-item">
                <i class="fa-solid fa-chart-pie"></i>
                <span>Métricas</span>
            </a>
            <button class="tab-item" onclick="document.getElementById('btn-logout').click()">
                <i class="fa-solid fa-power-off" style="color: var(--utm-red);"></i>
                <span style="color: var(--utm-red);">Salir</span>
            </button>
        </nav>
    </div>
</body>
</html>
