<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente - UTM</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.css">
    <link rel="stylesheet" href="css/profesores.css">
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/locale/es.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
</head>
<body>
<section class="dashboard-profesor">
    <header class="profesor-header">
        <h2 id="nombreDocente">Cargando...</h2>
        <button onclick="localStorage.clear(); location.href='login.html'" class="btn btn-sm btn-danger">Cerrar Sesión</button>
    </header>

    <div class="calendario-wrapper">
        <div class="calendario-titulo">CALENDARIO DE SOLICITUDES</div>
        <div class="container-fluid">
            <div id="calendario"></div>
        </div>
    </div>

    <aside class="panel-controles">
        <div class="leyenda-item"><div class="color-muestra" style="background: #4caf50;"></div><span>Pase Aprobado</span></div>
        <div class="leyenda-item"><div class="color-muestra" style="background: #efa81a;"></div><span>Pase Pendiente</span></div>
        <div class="leyenda-item"><div class="color-muestra" style="background: #9f2626;"></div><span>Permiso (Días)</span></div>
        <div class="p-3 text-center mt-4" style="background: #f8f9fa; border-radius: 8px; border: 1px dashed #ccc;">
            <small>Haz clic en un día del calendario para realizar una solicitud</small>
        </div>
    </aside>

    <div class="modal fade" id="modalFormulario" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header" style="background: #9f2626; color: white;">
                    <h5 class="modal-title" id="tituloFormulario">Nueva Solicitud</h5>
                    <button type="button" class="close" data-dismiss="modal" style="color: white;"><span>&times;</span></button>
                </div>
                <div class="modal-body">
                    <form id="formSolicitud">
                        <div class="form-group">
                            <label>¿Qué deseas solicitar?</label>
                            <select id="tipoSolicitud" class="form-control">
                                <option value="">Selecciona una opción</option>
                                <option value="pase">Pase de Salida (Horas)</option>
                                <option value="permiso">Permiso con Goce (Días)</option>
                            </select>
                        </div>

                        <div id="camposDinamicos"></div>

                        <div class="form-group">
                            <label>Motivo</label>
                            <textarea id="motivo" class="form-control" rows="3" required></textarea>
                        </div>
                        
                        <div class="text-right">
                            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success">Enviar Solicitud</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
<script src="js/principal.js"></script>
</body>
</html>
